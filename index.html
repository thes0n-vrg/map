<!DOCTYPE html>
<html>
<head>
    <title>Bản đồ KCN Hiệp Thạnh</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body { height: 100%; margin: 0; }
        #map { height: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>

    // ===== 1. MAP =====
    var map = L.map('map').setView([11.14, 106.23], 13);

    // ===== 2. NỀN BẢN ĐỒ =====
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // ===== 3. CONTROL =====
    var control = L.control.layers(null, null).addTo(map);

    // ===== 4. LỚP CAO SU (NỀN CHÍNH) =====
    fetch('caosu.geojson')
    .then(res => res.json())
    .then(data => {

        var caosu = L.geoJSON(data, {

            style: function(feature) {
                return {
                    color: "green",
                    weight: 1,
                    fillOpacity: 0.3
                };
            },

            onEachFeature: function (feature, layer) {

                layer.on({
                    mouseover: function (e) {
                        e.target.setStyle({
                            weight: 2,
                            color: "yellow"
                        });
                    },
                    mouseout: function (e) {
                        caosu.resetStyle(e.target);
                    }
                });

                layer.bindPopup(
                    "<b>Vườn cao su</b><br>" +
                    "Diện tích: " + (feature.properties.area || "N/A") + " ha"
                );
            }

        }).addTo(map);

        control.addOverlay(caosu, "Cao su");

        map.fitBounds(caosu.getBounds());
    });

    // ===== 5. LỚP DIỆN TÍCH KCN =====
    fetch('kcnht.json')
    .then(res => res.json())
    .then(data => {

        var kcn = L.geoJSON(data, {
            style: {
                color: "orange",
                weight: 1,
                fillOpacity: 0.5
            },
            onEachFeature: function (feature, layer) {
                layer.bindPopup("<b>KCN Hiệp Thạnh</b>");
            }
        });

        control.addOverlay(kcn, "Diện tích KCN");
    });

    // ===== 6. LỚP RANH KCN =====
    fetch('ranhkcnht.json')
    .then(res => res.json())
    .then(data => {

        var ranh = L.geoJSON(data, {
            style: {
                color: "red",
                weight: 3,
                fillOpacity: 0
            }
        });

        control.addOverlay(ranh, "Ranh KCN");
    });

</script>

</body>
</html>
